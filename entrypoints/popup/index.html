<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tsuzuku</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <span class="logo">つづく</span>
    <h1>Tsuzuku</h1>
    <div class="header-actions">
      <button id="import-btn" class="icon-btn" title="Import from file">⬆</button>
      <button id="export-btn" class="icon-btn" title="Export to file">⬇</button>
      <button id="folder-btn" class="icon-btn" title="Local sync folder">📁</button>
    </div>
  </header>

  <input type="file" id="import-file" accept=".json" hidden />

  <div id="setup-banner" class="setup-banner hidden">
    <div class="setup-header">
      <span class="setup-title">📁 Local backup</span>
      <button id="setup-dismiss" class="setup-dismiss" title="Dismiss">✕</button>
    </div>
    <p class="setup-desc">
      Your list can be saved as a file on this device.
      It stays safe even if you reinstall the extension.
    </p>
    <button id="setup-choose" class="setup-cta">Choose a folder</button>
  </div>

  <div id="folder-panel" class="folder-panel hidden">
    <div class="folder-info">
      <span id="folder-name" class="folder-name"></span>
    </div>
    <button id="folder-change">Change</button>
  </div>

  <main>
    <p id="empty" class="empty hidden">No anime tracked yet.<br>Start watching on Franime or Crunchyroll.</p>
    <ul id="anime-list"></ul>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
